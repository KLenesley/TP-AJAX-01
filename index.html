<html>

<head>
    <meta charset="UTF-8">
    <title>OUKETI</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body OnLoad="BODY_OnLoad()">
    <h1 align=center>OUKETI-01</h1>
    <hr>
    <div id="DIV_MotsClesRestants">Mots Clés Restants :</div>
    <div id="DIV_MotsChoisis">Mots Choisis :</div>
    <hr>
    <div id="DIV_Objets">
        <h2>Liste des objets</h2>
        <table border="1" id="TABLE_Objets">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Quantité</th>
                    <th>Label</th>
                    <th>Est Conteneur</th>
                    <th>Contenu Dans</th>
                    <th>Image</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <div id="DIV_DetailObjet">
        <h2>Détail de l'objet sélectionné</h2>
        <div id="DETAIL_Content">
            <p>Sélectionnez une ligne pour afficher le détail.</p>
        </div>
        <hr>
        <h2>CRUD objet</h2>
        <form id="FORM_CRUD" autocomplete="off">
            <div id="DIV_CRUD_Form">
                <label for="OBJ_id">ID</label>
                <input type="number" id="OBJ_id" required>

                <label for="OBJ_label">Libellé</label>
                <input type="text" id="OBJ_label" required>

                <label for="OBJ_qte">Quantité</label>
                <input type="number" id="OBJ_qte" value="1" min="0" required>

                <label for="OBJ_estConteneur">Est conteneur</label>
                <input type="checkbox" id="OBJ_estConteneur">

                <label for="OBJ_estContenuDans">Contenu dans (ID)</label>
                <input type="number" id="OBJ_estContenuDans" min="1">

                <label for="OBJ_img">Image</label>
                <input type="text" id="OBJ_img" placeholder="ex: 2.jpg">
            </div>
            <div id="DIV_CRUD_Actions">
                <button type="button" id="BTN_Create" onclick="createObjet()">Créer</button>
                <button type="button" id="BTN_ResetForm" onclick="resetForm()">Reset</button>
                <button type="button" id="BTN_Update" onclick="updateObjet()">Mettre à jour</button>
                <button type="button" id="BTN_Delete" onclick="deleteObjet()">Supprimer</button>
            </div>
        </form>
    </div>
    <hr>
    <textarea id="debug" cols="60" rows="20">
    </textarea>
</body>

</html>
